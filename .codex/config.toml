# EVM Cortex - Codex CLI configuration
# https://github.com/ccashwell/evm-cortex

model = "gpt-5.3-codex"

# Codex will read AGENTS.md as project instructions
# It can also fall back to CLAUDE.md if present
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md"]

[history]
# Persist conversation history
persistence = "local"

[skills]
# Skills directory - Codex auto-discovers SKILL.md files here
path = "skills"
