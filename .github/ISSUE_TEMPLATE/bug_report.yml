name: Bug Report
description: Something isn't working
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `./install.sh` or use agent...
        2. See error...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Hook (hooks/src/)
        - Agent (agents/)
        - Skill (skills/)
        - Rule (rules/)
        - CLI (bin/cli.mjs)
        - Installer (install.sh)
        - Other

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15, Ubuntu 24, etc."

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v25.x"

  - type: input
    id: version
    attributes:
      label: evm-cortex version
      description: "Check package.json version field"
      placeholder: "v1.0.x"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help.
