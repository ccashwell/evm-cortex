name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          review_comment_prefix: "evm-cortex-review"
          direct_prompt: |
            Review this PR for:
            1. Solidity code quality and security patterns
            2. Smart contract vulnerabilities (reentrancy, access control, oracle manipulation)
            3. Gas optimization opportunities
            4. Test coverage gaps (Foundry tests)
            5. Breaking changes to existing contracts

            Use evm-cortex's code-reviewer agent standards.
            Provide VERDICT: PASS | WARN | FAIL
